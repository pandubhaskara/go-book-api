# fly.toml app configuration file generated for go-book-api on 2026-03-02T02:39:38+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'go-book-api'
primary_region = 'sin'

[build]
  [build.args]
    GO_VERSION = '1.25.0'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
