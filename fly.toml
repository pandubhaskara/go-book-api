# fly.toml app configuration file generated for go-book-api on 2026-03-01T20:01:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'go-book-api'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"

[http_service]
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
